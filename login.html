<button onclick="login()">ورود</button>

<script>
function login(){
  const user = document.querySelectorAll("input")[0].value;
  const pass = document.querySelectorAll("input")[1].value;

  if(user && pass){
    window.location.href = "dashboard.html";
  } else {
    alert("اطلاعات کامل نیست");
  }
}
</script>
