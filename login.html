<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>ورود</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0f172a;
      font-family:sans-serif;
      color:white;
    }

    .box{
      width:300px;
      padding:30px;
      background:rgba(255,255,255,0.05);
      border-radius:15px;
      border:1px solid rgba(255,255,255,0.1);
      backdrop-filter:blur(10px);
    }

    input{
      width:100%;
      padding:10px;
      margin:10px 0;
      border:none;
      border-radius:8px;
    }

    button{
      width:100%;
      padding:10px;
      background:#22c55e;
      border:none;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>ورود</h2>
    <input type="text" placeholder="نام کاربری">
    <input type="password" placeholder="رمز عبور">
    <button>ورود</button>
  </div>

</body>
</html>
