<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>ورود</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0f172a,#111827);
      font-family:sans-serif;
      color:white;
    }

    .box{
      width:320px;
      padding:30px;
      background:rgba(255,255,255,0.06);
      border-radius:15px;
      border:1px solid rgba(255,255,255,0.1);
      backdrop-filter:blur(12px);
      text-align:center;
    }

    input{
      width:100%;
      padding:12px;
      margin:10px 0;
      border:none;
      border-radius:8px;
      outline:none;
    }

    button{
      width:100%;
      padding:12px;
      background:#22c55e;
      border:none;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
    }

    a{
      display:block;
      margin-top:15px;
      color:#38bdf8;
      text-decoration:none;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>ورود به حساب</h2>
    <input placeholder="نام کاربری">
    <input type="password" placeholder="رمز عبور">
    <button>ورود</button>

    <a href="index.html">بازگشت</a>
  </div>

</body>
</html>
