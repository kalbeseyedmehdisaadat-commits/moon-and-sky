<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOON and SkY ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:tahoma;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(#dff3ff,#ffffff);
display:flex;
justify-content:center;
align-items:center;
}

.sky{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
}

.cloud{
position:absolute;
font-size:70px;
opacity:.45;
animation:moveCloud 35s linear infinite;
}

.cloud:nth-child(1){
top:12%;
left:-20%;
}

.cloud:nth-child(2){
top:65%;
left:-30%;
animation-duration:45s;
}

@keyframes moveCloud{
from{transform:translateX(0);}
to{transform:translateX(170vw);}
}

.star{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
animation:blink 2s infinite;
}

@keyframes blink{
50%{opacity:.2;}
}

.card{
position:relative;
width:340px;
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 15px 35px rgba(0,0,0,.15);
text-align:center;
z-index:5;
animation:show .8s;
}

@keyframes show{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h1{
font-size:40px;
color:#333;
margin-bottom:10px;
}

.sub{
color:#777;
margin-bottom:20px;
}

.counter{
background:#f5f9ff;
padding:15px;
border-radius:15px;
margin-bottom:20px;
font-size:20px;
color:#444;
}

input{
width:100%;
padding:13px;
border:none;
background:#f2f2f2;
border-radius:12px;
font-size:17px;
margin-bottom:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#5ba8ff;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.03);
background:#348dff;
}

.heart{
font-size:40px;
animation:pulse 1.5s infinite;
margin:15px 0;
}

@keyframes pulse{
50%{
transform:scale(1.2);
}
}

.footer{
margin-top:20px;
font-size:15px;
color:#888;
}
</style>

</head>

<body>

<div class="sky">
<div class="cloud">☁️</div>
<div class="cloud">☁️</div>
</div>

<div class="card">

<h1>🌙 MOON & SkY ☁️</h1>

<div class="sub">
هر خاطره‌ای، یک ستاره در آسمان ماست
</div>

<div class="heart">❤️</div>

<div class="counter" id="days">
...
</div>

<input type="password" id="pass" placeholder="رمز ورود">

<button onclick="login()">
ورود به دنیای ما
</button>

<div class="footer">
شروع عشق ما ❤️<br>
5 September 2025
</div>

</div>

<script>

for(let i=0;i<70;i++){

let s=document.createElement("div");

s.className="star";

s.style.left=Math.random()*100+"%";

s.style.top=Math.random()*100+"%";

s.style.animationDelay=Math.random()*3+"s";

document.querySelector(".sky").appendChild(s);

}

let start=new Date("2025-09-05");

let now=new Date();

let diff=Math.floor((now-start)/(1000*60*60*24));

document.getElementById("days").innerHTML=
"❤️ "+diff+" روز کنار هم";

function login(){

let pass=document.getElementById("pass").value;

if(pass=="moon123"){

alert("خوش اومدی Moon ❤️");

}else if(pass=="sky123"){

alert("خوش اومدی Sky ☁️");

}else{

alert("رمز اشتباهه");

}

}

</script>

</body>
</html>
